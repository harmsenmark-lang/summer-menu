<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pier Summer School Menu</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#fff; --bg2:#f6f5f2; --bg3:#eeecea;
  --text:#1a1a18; --text2:#6b6a65; --text3:#9b9a94;
  --border:rgba(0,0,0,0.10); --border2:rgba(0,0,0,0.18);
  --accent:#1a6b3c; --accent-bg:#eaf4ee; --accent-text:#1a6b3c;
  --warn-bg:#fff3e6; --warn-text:#7a3a00;
  --danger-bg:#fdf0f0; --danger-text:#8b1a1a; --danger-border:rgba(139,26,26,0.3);
  --info-bg:#eef3fd; --info-text:#1a3a6b;
  --double-bg:#fff8e6; --double-text:#7a4a00; --double-border:#f0c040;
  --radius:10px; --radius-sm:6px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a; --bg2:#252522; --bg3:#2e2e2b;
  --text:#f0efe9; --text2:#9b9a94; --text3:#6b6a65;
  --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.18);
  --accent-bg:#1a3327; --accent-text:#5ecb8a;
  --warn-bg:#2e1e00; --warn-text:#ffb766;
  --danger-bg:#2e1010; --danger-text:#ff8080; --danger-border:rgba(255,128,128,0.3);
  --info-bg:#101e30; --info-text:#7aabf7;
  --double-bg:#2a2000; --double-text:#ffd070; --double-border:#a07800;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;}
header{background:var(--bg);border-bottom:0.5px solid var(--border2);padding:1rem 1.5rem;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;}
header h1{font-size:17px;font-weight:600;}
header p{font-size:13px;color:var(--text2);margin-top:2px;}
.hdr-right{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.cycle-picker{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cycle-picker label{font-size:13px;color:var(--text2);white-space:nowrap;}
select,input[type=number]{font-family:inherit;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;}
.qty-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.qty-row label{font-size:13px;color:var(--text2);white-space:nowrap;}
.qty-row input[type=number]{width:70px;cursor:text;}
.qty-lbl{font-size:12px;color:var(--text3);}
.tabs{display:flex;gap:4px;padding:1rem 1.5rem 0;}
.tab{padding:8px 16px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;border:0.5px solid var(--border);border-bottom:none;background:var(--bg3);cursor:pointer;font-size:14px;color:var(--text2);font-family:inherit;}
.tab.active{background:var(--bg);color:var(--text);font-weight:500;border-color:var(--border2);}
.tab:hover:not(.active){background:var(--bg2);}
.content{background:var(--bg);border:0.5px solid var(--border2);border-radius:0 var(--radius) var(--radius) var(--radius);margin:0 1.5rem 2rem;padding:1.25rem;}
.section{display:none;}
.section.active{display:block;}
.week-nav{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center;}
.week-btn{padding:6px 14px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:13px;color:var(--text2);font-family:inherit;}
.week-btn.active{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent-text);font-weight:500;}
.week-label{font-size:12px;color:var(--text3);margin-left:auto;}
.day-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;}
@media(max-width:640px){.day-grid{grid-template-columns:1fr 1fr;}}
.day-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;}
.day-card:hover{border-color:var(--border2);}
.day-card.selected{border-color:var(--accent-text);background:var(--accent-bg);}
.day-name{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.day-date{font-size:13px;font-weight:500;margin-bottom:8px;}
.pill{font-size:11px;padding:2px 8px;border-radius:99px;display:inline-block;margin:2px 2px 2px 0;}
.pill-b{background:var(--warn-bg);color:var(--warn-text);}
.pill-l{background:var(--accent-bg);color:var(--accent-text);}
.pill-alert{background:var(--danger-bg);color:var(--danger-text);}
.pill-delivery{background:var(--info-bg);color:var(--info-text);}

/* collapsible detail panel */
.detail-panel{margin-top:1.25rem;border:0.5px solid var(--border2);border-radius:var(--radius);display:none;}
.collapse-header{display:flex;align-items:center;justify-content:space-between;padding:14px 1.25rem;cursor:pointer;user-select:none;}
.collapse-header:hover{background:var(--bg2);border-radius:var(--radius);}
.collapse-title{font-size:17px;font-weight:600;}
.collapse-arrow{font-size:14px;color:var(--text3);transition:transform 0.2s;}
.collapse-arrow.open{transform:rotate(180deg);}
.collapse-body{padding:0 1.25rem 1.25rem;}

.notice{padding:10px 14px;border-radius:var(--radius-sm);font-size:14px;margin-bottom:10px;}
.notice-alert{background:var(--danger-bg);color:var(--danger-text);}
.notice-delivery{background:var(--info-bg);color:var(--info-text);}
.detail-2col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;}
@media(max-width:560px){.detail-2col{grid-template-columns:1fr;}}
.detail-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.detail-item{font-size:14px;padding:5px 0;border-bottom:0.5px solid var(--border);}
.detail-item:last-child{border-bottom:none;}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:14px;}
.check-item:last-child{border-bottom:none;}
.check-item input[type=checkbox]{width:16px;height:16px;margin-top:1px;cursor:pointer;flex-shrink:0;accent-color:var(--accent);}
.check-item.done label{text-decoration:line-through;color:var(--text3);}
.check-item label{cursor:pointer;flex:1;}
.check-item .del-task{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);padding:0 2px;line-height:1;flex-shrink:0;}
.check-item .del-task:hover{color:var(--danger-text);}
.check-item.system-task label{color:var(--danger-text);}
.check-item.system-task{background:var(--danger-bg);border-radius:var(--radius-sm);padding:7px 10px;margin-bottom:4px;border:0.5px solid var(--danger-border);}
.check-item.system-task.done label{color:var(--text3);}
.check-item.warn-task label{color:var(--warn-text);}
.check-item.warn-task{background:var(--warn-bg);border-radius:var(--radius-sm);padding:7px 10px;margin-bottom:4px;border:0.5px solid rgba(122,58,0,0.25);}
.check-item.warn-task.done label{color:var(--text3);}

.add-task-row{display:flex;gap:8px;margin-top:10px;}
.add-task-row input[type=text]{flex:1;font-family:inherit;font-size:14px;padding:7px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);}
.add-task-row button{padding:7px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;font-size:13px;white-space:nowrap;}
.add-task-row button:hover{background:var(--bg2);}

.progress-bar{height:3px;background:var(--bg3);border-radius:99px;margin-top:6px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 0.3s;}
.progress-label{font-size:12px;color:var(--text3);margin-top:4px;margin-bottom:10px;}
.reset-btn{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;text-decoration:underline;}

/* cashier collapsible */
.cheat-entry{border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;background:var(--bg2);overflow:hidden;}
.cheat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none;}
.cheat-header:hover{background:var(--bg3);}
.cheat-title{font-size:14px;font-weight:600;}
.cheat-body{padding:0 14px 14px;display:none;}
.cheat-body.open{display:block;}
.cheat-check{font-size:14px;margin-bottom:4px;}
.cheat-sides{font-size:13px;color:var(--text2);margin-bottom:6px;}
.cheat-reject{font-size:13px;color:var(--danger-text);background:var(--danger-bg);padding:7px 10px;border-radius:var(--radius-sm);}

/* order collapsible */
.order-section{margin-bottom:10px;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;}
.order-header{display:flex;align-items:flex-start;justify-content:space-between;padding:14px;cursor:pointer;user-select:none;gap:12px;}
.order-header:hover{background:var(--bg2);}
.order-header-left{flex:1;min-width:0;}
.order-header-title{font-size:15px;font-weight:600;}
.order-header-sub{font-size:13px;color:var(--text2);margin-top:2px;}
.order-header-meta{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.order-body{padding:0 14px 14px;display:none;}
.order-body.open{display:block;}
.order-group-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:12px 0 4px;}
.order-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);}
.order-row:last-child{border-bottom:none;}
.order-row input[type=checkbox]{width:16px;height:16px;margin-top:2px;cursor:pointer;flex-shrink:0;accent-color:var(--accent);}
.order-row-body{flex:1;min-width:0;}
.order-row.done .order-item-name{text-decoration:line-through;color:var(--text3);}
.order-item-name{font-size:14px;color:var(--text);cursor:pointer;}
.order-item-used{font-size:12px;color:var(--text2);margin-top:3px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.used-tag{font-size:11px;padding:1px 8px;border-radius:99px;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2);white-space:nowrap;}
.double-badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px;background:var(--double-bg);color:var(--double-text);border:0.5px solid var(--double-border);white-space:nowrap;}
.legend{display:flex;align-items:center;gap:8px;margin-bottom:1rem;padding:10px 14px;background:var(--double-bg);border:0.5px solid var(--double-border);border-radius:var(--radius-sm);font-size:13px;color:var(--double-text);}
.cycle-banner{background:var(--info-bg);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:8px 14px;margin-bottom:1.25rem;font-size:13px;color:var(--info-text);}
.progress-pill{font-size:11px;padding:2px 9px;border-radius:99px;background:var(--bg3);color:var(--text2);white-space:nowrap;border:0.5px solid var(--border);}
.progress-pill.done-all{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent-text);}
.add-order-row{display:flex;gap:8px;margin-top:10px;}
.add-order-row input[type=text]{flex:1;font-family:inherit;font-size:14px;padding:7px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);}
.add-order-row button{padding:7px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;font-size:13px;}
.add-order-row button:hover{background:var(--bg2);}
.order-custom-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);}
.order-custom-row .del-task{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);padding:0 2px;flex-shrink:0;}
.order-custom-row .del-task:hover{color:var(--danger-text);}
.order-custom-row.done .order-item-name{text-decoration:line-through;color:var(--text3);}
/* inventory */
.inv-row{display:flex;align-items:center;gap:10px;margin-top:5px;flex-wrap:wrap;}
.inv-field{display:flex;align-items:center;gap:5px;}
.inv-field label{font-size:11px;color:var(--text3);white-space:nowrap;}
.inv-field input[type=number]{width:66px;font-size:13px;padding:3px 8px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);cursor:text;-moz-appearance:textfield;}
.inv-field input[type=number]::-webkit-outer-spin-button,.inv-field input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.inv-field input[type=number]:focus{outline:none;border-color:var(--accent);background:var(--bg);}
.qty-chip{font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px;white-space:nowrap;}
.qty-chip.need{background:var(--danger-bg);color:var(--danger-text);}
.qty-chip.ok{background:var(--accent-bg);color:var(--accent-text);}
.qty-chip.exact{background:var(--bg3);color:var(--text2);}
.qty-formula{font-size:11px;color:var(--text3);}
.order-actions{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.action-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;}
.action-btn:hover{background:var(--bg2);}
.action-btn.primary{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent-text);}
.action-btn.primary:hover{opacity:0.85;}
.email-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:flex;align-items:center;justify-content:center;}
.email-modal{background:var(--bg);border-radius:var(--radius);padding:1.5rem;width:min(480px,90vw);border:0.5px solid var(--border2);}
.email-modal h3{font-size:16px;font-weight:600;margin-bottom:1rem;}
.email-modal label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px;margin-top:10px;}
.email-modal input[type=text],.email-modal input[type=email],.email-modal select{width:100%;font-family:inherit;font-size:14px;padding:8px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);}
.email-modal input:focus{outline:none;border-color:var(--accent);}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end;}
@media print{
  .print-site-label{display:block!important;font-size:18px;font-weight:700;margin-bottom:6px;}
  header,.tabs,.week-nav,.day-grid,.detail-panel,.cycle-banner,.legend,.order-actions,
  .add-order-row,.order-custom-row .del-task,.inv-field,.qty-formula,
  button,.reset-btn,.progress-bar,.progress-label,.progress-pill{display:none!important;}
  body{background:white!important;color:black!important;}
  .content{border:none!important;margin:0!important;padding:0!important;}
  .section{display:block!important;}
  #menu,#cashier{display:none!important;}
  #orders{display:block!important;}
  /* Hide all order sections by default, show only the targeted one */
  .order-section{display:none!important;}
  body[data-print-oi="0"] .order-section[data-oi="0"],
  body[data-print-oi="1"] .order-section[data-oi="1"],
  body[data-print-oi="2"] .order-section[data-oi="2"],
  body[data-print-oi="3"] .order-section[data-oi="3"],
  body[data-print-oi="4"] .order-section[data-oi="4"]{display:block!important;}
  .order-header{padding:10px!important;border-bottom:1px solid #ccc!important;}
  .order-body{display:block!important;padding:10px!important;}
  .order-header-title{font-size:14px!important;font-weight:bold!important;}
  .order-header-sub{font-size:12px!important;color:#666!important;}
  .order-item-name{font-size:13px!important;}
  .used-tag,.double-badge,.qty-chip{font-size:11px!important;}
  .qty-chip.need{border:1px solid #c00!important;color:#c00!important;background:white!important;padding:1px 6px!important;border-radius:4px!important;}
  .qty-chip.ok{border:1px solid #080!important;color:#080!important;background:white!important;padding:1px 6px!important;border-radius:4px!important;}
  .inv-row{flex-wrap:nowrap!important;}
  .inv-field label{color:#666!important;}
}
</style>
</head>
<body>
<header>
  <div>
    <h1>&#127822; Pier — Summer School Menu</h1>
    <p id="headerSub">50 breakfasts / 70 lunches per day</p>
  </div>
  <div class="hdr-right">
    <div class="cycle-picker">
      <label for="cycleSel">&#128197; Cycle starting:</label>
      <select id="cycleSel" onchange="setCycle(this.value)">
        <option value="2026-06-08">Cycle 1: Jun 8 – Jun 26</option>
        <option value="2026-06-29">Cycle 2: Jun 29 – Jul 17</option>
        <option value="2026-07-20">Cycle 3: Jul 20 – Aug 7</option>
        <option value="2026-08-10">Cycle 4: Aug 10 – Aug 28</option>
      </select>
    </div>
    <div class="qty-row">
      <label>&#127830; Breakfasts/day:</label>
      <input type="number" id="qtyB" value="50" min="1" max="999" onchange="updateQtys()">
      <label>&#127829; Lunches/day:</label>
      <input type="number" id="qtyL" value="70" min="1" max="999" onchange="updateQtys()">
    </div>
  </div>
</header>
<div class="tabs">
  <button class="tab active" onclick="showTab('menu',this)">Daily menu</button>
  <button class="tab" onclick="showTab('cashier',this)">Cashier guide</button>
  <button class="tab" onclick="showTab('orders',this)">Order checklists</button>
</div>
<div class="content">
  <div id="menu" class="section active">
    <div class="cycle-banner" id="cycleBanner"></div>
    <div class="week-nav">
      <button class="week-btn active" id="wbtn0" onclick="setWeek(0,this)">Week 1</button>
      <button class="week-btn" id="wbtn1" onclick="setWeek(1,this)">Week 2</button>
      <button class="week-btn" id="wbtn2" onclick="setWeek(2,this)">Week 3</button>
      <span class="week-label">Click a day for details &amp; prep tasks</span>
    </div>
    <div class="day-grid" id="dayGrid"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="collapse-header" onclick="toggleDetailPanel()">
        <span class="collapse-title" id="detailTitle"></span>
        <span class="collapse-arrow open" id="detailArrow">&#9660;</span>
      </div>
      <div class="collapse-body" id="detailBody"></div>
    </div>
  </div>
  <div id="cashier" class="section">
    <div id="cashierList"></div>
  </div>
  <div id="orders" class="section">
    <div class="print-site-label" style="display:none;">&#127822; Pier — Summer School Menu</div>
    <div class="legend">&#9888; Items marked <strong style="margin:0 4px;">&#215;2+ days</strong> are used on multiple days — check quantity needed.</div>
    <div id="orderList"></div>
  </div>
</div>

<!-- Email modal -->
<div class="email-modal-bg" id="emailModalBg" style="display:none;" onclick="if(event.target===this)closeEmailModal()">
  <div class="email-modal">
    <h3>&#9993; Email an order</h3>
    <label>Select order to send</label>
    <select id="emailOrderSel"></select>
    <label>To (email address)</label>
    <input type="email" id="emailTo" placeholder="vendor@example.com">
    <label>Subject</label>
    <input type="text" id="emailSubject">
    <div class="modal-actions">
      <button class="action-btn" onclick="closeEmailModal()">Cancel</button>
      <button class="action-btn primary" onclick="sendEmail()">Open in Gmail to review &amp; send &#8599;</button>
    </div>
  </div>
</div>

<script>
// ── Date helpers ──────────────────────────────────────────────────────────────
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function parseLocal(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d;}
function fmt(date){return `${DAYS[date.getDay()]} ${MONTHS[date.getMonth()]} ${date.getDate()}`;}
function fmtShort(date){return `${date.getMonth()+1}/${date.getDate()}`;}

// ── State ─────────────────────────────────────────────────────────────────────
let cycleStart=parseLocal('2026-06-08');
let qtyB=50, qtyL=70;
let currentWeek=0, selectedDay=null;
const prepChecks={}, customTasks={}, taskDone={};
const orderChecks={}, customOrderItems={}, customOrderDone={};
const inventory={}; // key → on-hand qty entered by user
let detailOpen=true;

function cycleDate(wk,d){return addDays(cycleStart,wk*7+d);}
function cd(wk,d){return cycleDate(wk,d);}
function cycleKey(){return cycleStart.toISOString().slice(0,10);}

// ── Menu templates ────────────────────────────────────────────────────────────
const weekTemplates=[
  [
    {day:'Mon',alert:false,delivery:false,
     breakfast:['Trix Cereal Bar (1 each)','Low Fat Mozzarella String Cheese (1 each)','Assorted Fruit Juice (1 each)','1% Low-fat Milk / Choc Milk'],
     lunch:['Ham & American Cheese Sandwich','— Bun (1)','— Ham, 3 slices','— Cheese, 2 slices','— Mayo packet (1)','Fresh Broccoli Florets (68g / 2.4 oz bag)','Chilled Diced Pears','Milk'],

// ── Qty substitution ──────────────────────────────────────────────────────────
function applyQty(str){
  return str
    .replace(/\{QB\}/g,qtyB)
    .replace(/\{QL\}/g,qtyL)
    .replace(/\{QL2\}/g,qtyL*2)
    .replace(/\{QL3\}/g,qtyL*3)
    .replace(/\{QL5\}/g,qtyL*5)
    .replace(/\{QL6\}/g,qtyL*6);
}

// ── Prep template resolution ──────────────────────────────────────────────────
function resolvePrep(template,wk,d){
  const tue=fmt(cd(wk,1)),wed=fmt(cd(wk,2)),thu=fmt(cd(wk,3)),fri=fmt(cd(wk,4));
  const nextMon=(wk<2)?fmt(cd(wk+1,0)):'(next cycle Mon)';
  return applyQty(template
    .replace(/{TUE}/g,tue).replace(/{WED}/g,wed)
    .replace(/{THU}/g,thu).replace(/{FRI}/g,fri)
    .replace(/{MON2}/g,nextMon));
}

function applyQtyToMenu(arr){ return arr.map(x=>applyQty(x)); }

function selectDay(i){
  selectedDay=i; renderDays();
  const tpl=weekTemplates[currentWeek][i];
  const date=cd(currentWeek,i);
  const panel=document.getElementById('detailPanel');
  panel.style.display='block';
  document.getElementById('detailTitle').textContent=`${tpl.day}, ${fmt(date)}`;
  detailOpen=true;
  document.getElementById('detailBody').style.display='block';
  document.getElementById('detailArrow').classList.add('open');

  const ck=cycleKey();
  const wk=currentWeek;

  // Build prep items: system order task (if this day has a deadline) + template tasks + custom tasks
  let bodyHtml='';
  if(tpl.alert) bodyHtml+=`<div class="notice notice-alert">&#9888; Order deadline: ${tpl.alert}</div>`;
  if(tpl.delivery) bodyHtml+=`<div class="notice notice-delivery">&#128666; ${tpl.delivery}</div>`;

  // Breakfast & Lunch cols
  bodyHtml+=`<div class="detail-2col"><div><div class="detail-label">Breakfast items</div>`;
  applyQtyToMenu(tpl.breakfast).forEach(x=>{bodyHtml+=`<div class="detail-item">${x}</div>`;});
  bodyHtml+=`</div><div><div class="detail-label">Lunch items</div>`;
  applyQtyToMenu(tpl.lunch).forEach(x=>{bodyHtml+=`<div class="detail-item">${x}</div>`;});
  bodyHtml+=`</div></div>`;

  // Collect all tasks for this day
  const sysTasks=[];
  const oKey=`${wk}-${i}`;
  if(orderDeadlineMap[oKey]!==undefined){
    const oi=orderDeadlineMap[oKey];
    const oDate=fmt(cd(orderTemplates[oi].deliverDay.wk,orderTemplates[oi].deliverDay.d));
    const coverDates=orderTemplates[oi].coversDays.map(c=>fmtShort(cd(c.wk,c.d))).join(' & ');
    sysTasks.push({id:orderTaskKey(wk,i), label:`&#128722; Submit food order by end of day — delivered ${oDate}, covers ${coverDates}`});
  }
  if(milkDeadlineDays[oKey]){
    const milkDeliverDate=fmt(cd(wk,3)); // Milk arrives Thursday
    sysTasks.push({id:milkTaskKey(wk,i), label:`&#127868; Submit milk order by end of day — delivered ${milkDeliverDate}`});
  }
  const prepItems=tpl.prepTemplate.map(t=>resolvePrep(t,wk,i));
  const custList=customTasks[`${ck}-${wk}-${i}`]||[];

  // Count all tasks for progress
  const allTaskCount=sysTasks.length+prepItems.length+custList.length;
  const sysDone=sysTasks.filter(t=>taskDone[t.id]).length;
  const prepDone=prepItems.filter((_,idx)=>prepChecks[mkPrepId(ck,wk,i,idx)]).length;
  const custDone=custList.filter((_,idx)=>taskDone[mkCustomId(ck,wk,i,idx)]).length;
  const totalDone=sysDone+prepDone+custDone;

  bodyHtml+=`<div><div class="detail-label">Prep tasks &amp; to-dos</div>
  <div class="progress-bar"><div class="progress-fill" id="pbar" style="width:${allTaskCount?Math.round(totalDone/allTaskCount*100):0}%"></div></div>
  <div class="progress-label" id="plbl">${totalDone} of ${allTaskCount} done &nbsp;<button class="reset-btn" onclick="resetPrep(${i})">reset all</button></div>`;

  // System order task
  sysTasks.forEach(t=>{
    const chk=taskDone[t.id];
    bodyHtml+=`<div class="check-item system-task${chk?' done':''}" id="srow-${t.id}">
      <input type="checkbox" id="schk-${t.id}"${chk?' checked':''} onchange="toggleSysTask('${t.id}',${i})">
      <label for="schk-${t.id}">${t.label}</label>
    </div>`;
  });

  // Regular prep tasks
  prepItems.forEach((p,idx)=>{
    const key=mkPrepId(ck,wk,i,idx),chk=prepChecks[key];
    const isWarn=p.startsWith('⚠️')||p.startsWith('&#9888;');
    bodyHtml+=`<div class="check-item${isWarn?' warn-task':''}${chk?' done':''}" id="prow-${idx}">
      <input type="checkbox" id="pchk-${idx}"${chk?' checked':''} onchange="togglePrep(${i},${idx},'${key}')">
      <label for="pchk-${idx}">${p}</label>
    </div>`;
  });

  // Custom tasks
  custList.forEach((task,idx)=>{
    const key=mkCustomId(ck,wk,i,idx),chk=taskDone[key];
    bodyHtml+=`<div class="check-item${chk?' done':''}" id="crow-${idx}">
      <input type="checkbox" id="cchk-${idx}"${chk?' checked':''} onchange="toggleCustomTask(${i},${idx},'${key}')">
      <label for="cchk-${idx}">${task}</label>
      <button class="del-task" onclick="deleteCustomTask(${i},${idx})" title="Remove task">&#10005;</button>
    </div>`;
  });

  // Add task input
  bodyHtml+=`<div class="add-task-row">
    <input type="text" id="newTaskInput" placeholder="Add a task for this day…" onkeydown="if(event.key==='Enter')addCustomTask(${i})">
    <button onclick="addCustomTask(${i})">+ Add</button>
  </div></div>`;

  document.getElementById('detailBody').innerHTML=bodyHtml;
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function rebuildPrepProgress(dayIdx){
  const ck=cycleKey(), wk=currentWeek, i=dayIdx;
  const tpl=weekTemplates[wk][i];
  const oKey=`${wk}-${i}`;
  const foodTaskId=orderDeadlineMap[oKey]!==undefined?orderTaskKey(wk,i):null;
  const milkId=milkDeadlineDays[oKey]?milkTaskKey(wk,i):null;
  const sysCount=(foodTaskId?1:0)+(milkId?1:0);
  const prepItems=tpl.prepTemplate;
  const custList=customTasks[`${ck}-${wk}-${i}`]||[];
  const allTaskCount=sysCount+prepItems.length+custList.length;
  const sysDone=(foodTaskId&&taskDone[foodTaskId]?1:0)+(milkId&&taskDone[milkId]?1:0);
  const prepDone=prepItems.filter((_,idx)=>prepChecks[mkPrepId(ck,wk,i,idx)]).length;
  const custDone=custList.filter((_,idx)=>taskDone[mkCustomId(ck,wk,i,idx)]).length;
  const totalDone=sysDone+prepDone+custDone;
  const bar=document.getElementById('pbar'),lbl=document.getElementById('plbl');
  if(bar) bar.style.width=(allTaskCount?Math.round(totalDone/allTaskCount*100):0)+'%';
  if(lbl) lbl.innerHTML=`${totalDone} of ${allTaskCount} done &nbsp;<button class="reset-btn" onclick="resetPrep(${dayIdx})">reset all</button>`;
}
function toggleSysTask(id,dayIdx){
  taskDone[id]=!taskDone[id];
  const row=document.getElementById(`srow-${id}`);
  if(row) taskDone[id]?row.classList.add('done'):row.classList.remove('done');
  rebuildPrepProgress(dayIdx);
}
function togglePrep(dayIdx,taskIdx,key){
  prepChecks[key]=!prepChecks[key];
  const row=document.getElementById(`prow-${taskIdx}`);
  if(row) prepChecks[key]?row.classList.add('done'):row.classList.remove('done');
  rebuildPrepProgress(dayIdx);
}
function toggleCustomTask(dayIdx,taskIdx,key){
  taskDone[key]=!taskDone[key];
  const row=document.getElementById(`crow-${taskIdx}`);
  if(row) taskDone[key]?row.classList.add('done'):row.classList.remove('done');
  rebuildPrepProgress(dayIdx);
}
function addCustomTask(dayIdx){
  const inp=document.getElementById('newTaskInput');
  const val=inp.value.trim();
  if(!val) return;
  const ck=cycleKey(), wk=currentWeek, i=dayIdx;
  const k=`${ck}-${wk}-${i}`;
  if(!customTasks[k]) customTasks[k]=[];
  customTasks[k].push(val);
  selectDay(dayIdx);
}
function deleteCustomTask(dayIdx,taskIdx){
  const ck=cycleKey(), wk=currentWeek, i=dayIdx;
  const k=`${ck}-${wk}-${i}`;
  if(customTasks[k]){
    // also clear its done state
    delete taskDone[mkCustomId(ck,wk,i,taskIdx)];
    // shift remaining keys down
    for(let j=taskIdx+1;j<customTasks[k].length;j++){
      taskDone[mkCustomId(ck,wk,i,j-1)]=taskDone[mkCustomId(ck,wk,i,j)];
      delete taskDone[mkCustomId(ck,wk,i,j)];
    }
    customTasks[k].splice(taskIdx,1);
  }
  selectDay(dayIdx);
}
function resetPrep(dayIdx){
  const ck=cycleKey(), wk=currentWeek, i=dayIdx;
  weekTemplates[wk][i].prepTemplate.forEach((_,idx)=>{delete prepChecks[mkPrepId(ck,wk,i,idx)];});
  const k=`${ck}-${wk}-${i}`;
  (customTasks[k]||[]).forEach((_,idx)=>{delete taskDone[mkCustomId(ck,wk,i,idx)];});
  const oKey=`${wk}-${i}`;
  if(orderDeadlineMap[oKey]!==undefined) delete taskDone[orderTaskKey(wk,i)];
  if(milkDeadlineDays[oKey]) delete taskDone[milkTaskKey(wk,i)];
  selectDay(dayIdx);
}

// ── Qty needed calculation ────────────────────────────────────────────────────
function calcQtyNeeded(item){
  // flatQty: item is ordered as a fixed quantity per order window, not per person
  if(item.flatQty) return item.flatQty * item.usedOn.length;
  return item.usedOn.length * item.qtyPer * (item.mealType==='B' ? qtyB : qtyL);
}
function invKey(oi,type,ii){return `inv-${oi}-${type}-${ii}`;}

function refreshQtyChip(oi,type,ii){
  const ik=invKey(oi,type,ii);
  const items=type==='b'?orderTemplates[oi].breakfast:orderTemplates[oi].lunch;
  const item=items[ii];
  if(!item) return;
  const needed=calcQtyNeeded(item);
  const onHand=parseInt(inventory[ik])||0;
  const toOrder=Math.max(0,needed-onHand);
  const chipEl=document.getElementById(`chip-${ik}`);
  const formulaEl=document.getElementById(`formula-${ik}`);
  if(chipEl){
    if(toOrder===0){chipEl.textContent='✓ Have enough';chipEl.className='qty-chip ok';}
    else{chipEl.textContent=`Order ${toOrder}`;chipEl.className='qty-chip need';}
  }
  if(formulaEl){
    const dayQty=item.mealType==='B'?qtyB:qtyL;
    if(item.flatQty){
      formulaEl.textContent=`Need: 1 packet per order = ${needed}`;
    } else {
      const perEntry=item.qtyPer>1?`${item.qtyPer}×${dayQty}`:dayQty;
      const parts=item.usedOn.map(()=>perEntry);
      formulaEl.textContent=`Need: ${parts.join(' + ')} = ${needed}${item.qtyPer>1?' ('+item.qtyPer+' per person)':''}`;
    }
  }
}

  const ik=invKey(oi,type,ii);

  const onHand=parseInt(inventory[ik])||0;
  const toOrder=Math.max(0,needed-onHand);
  const chipClass=toOrder===0?'ok':'need';
  const chipText=toOrder===0?'✓ Have enough':`Order ${toOrder}`;
  const dayQty=item.mealType==='B'?qtyB:qtyL;
  const formula = item.flatQty
    ? `Need: 1 packet per order${item.usedOn.length>1?' × '+item.usedOn.length+' days':''} = ${needed}`
    : (() => { const perEntry=item.qtyPer>1?`${item.qtyPer}×${dayQty}`:dayQty; return `Need: ${item.usedOn.map(()=>perEntry).join(' + ')} = ${needed}${item.qtyPer>1?' ('+item.qtyPer+' per person)':''}`; })();
  return `<div class="order-row${chk?' done':''}" id="orow-${key}">

    <div class="order-row-body">
      <div class="order-item-name" onclick="document.getElementById('ocb-${key}').click()">${item.name}</div>
      <div class="order-item-used">${usedTags}${doubleBadge}</div>
      <div class="inv-row">
        <div class="inv-field">
          <label for="inv-${ik}">On hand:</label>
          <input type="number" id="inv-${ik}" value="${onHand||''}" min="0" placeholder="0"
            oninput="inventory['${ik}']=parseInt(this.value)||0;refreshQtyChip(${oi},'${type}',${ii})">
        </div>
        <span class="qty-chip ${chipClass}" id="chip-${ik}">${chipText}</span>
        <span class="qty-formula" id="formula-${ik}">${formula}</span>
      </div>
    </div>
  </div>`;
}

function getOrderProgress(oi){
  const cycle=cycleKey(), o=orderTemplates[oi];
  const stdKeys=[...o.breakfast.map((_,ii)=>mkOrdId(cycle,oi,'b',ii)),...o.lunch.map((_,ii)=>mkOrdId(cycle,oi,'l',ii))];
  const custList=customOrderItems[`${cycle}-${oi}`]||[];
  const custKeys=custList.map((_,ii)=>mkCustOrdId(cycle,oi,ii));
  const allKeys=[...stdKeys,...custKeys];
  const done=stdKeys.filter(k=>orderChecks[k]).length + custKeys.filter(k=>customOrderDone[k]).length;
  return {total:allKeys.length,done};
}

function renderOrders(){
  const cycle=cycleKey();
  document.getElementById('orderList').innerHTML=orderTemplates.map((o,oi)=>{
    const orderDate=fmt(cd(o.orderDay.wk,o.orderDay.d));
    const deliverDate=fmt(cd(o.deliverDay.wk,o.deliverDay.d));
    const coverDates=o.coversDays.map(c=>fmt(cd(c.wk,c.d))).join(', ');
    const {total,done}=getOrderProgress(oi);
    const allDone=total>0&&done===total;
    const bItems=o.breakfast.map((item,ii)=>renderOrderItem(item,mkOrdId(cycle,oi,'b',ii),oi,'b',ii)).join('');
    const lItems=o.lunch.map((item,ii)=>renderOrderItem(item,mkOrdId(cycle,oi,'l',ii),oi,'l',ii)).join('');
    const custList=customOrderItems[`${cycle}-${oi}`]||[];
    const custItems=custList.map((name,ii)=>{
      const key=mkCustOrdId(cycle,oi,ii), chk=customOrderDone[key];
      return `<div class="order-custom-row${chk?' done':''}" id="corow-${key}">
        <input type="checkbox" id="cocb-${key}"${chk?' checked':''} onchange="toggleCustomOrder('${key}',${oi})">
        <div class="order-item-name" style="flex:1" onclick="document.getElementById('cocb-${key}').click()">${name}</div>
        <button class="del-task" onclick="deleteCustomOrder(${oi},${ii})" title="Remove">&#10005;</button>
      </div>`;
    }).join('');
    const custSection=custList.length?`<div class="order-group-label">Custom items</div>${custItems}`:'';
    return `<div class="order-section" data-oi="${oi}">
      <div class="order-header" onclick="toggleOrder_section(${oi})">
        <div class="order-header-left">
          <div class="order-header-title">${o._isBridgeOrder?'&#128259; CYCLE BRIDGE — ':''} Order by end of ${orderDate}</div>
          <div class="order-header-sub">${o._isBridgeOrder?'Covers <strong>next cycle</strong> ':'Delivered '+deliverDate+' — covers '}${coverDates}</div>
        </div>
        <div class="order-header-meta">
          <span class="progress-pill${allDone?' done-all':''}" id="opill-${oi}">${done}/${total}${allDone?' ✓':''}</span>
          <span id="oarr-${oi}" style="color:var(--text3);font-size:13px;">&#9660;</span>
        </div>
      </div>
      <div class="order-body" id="obody-${oi}">
        <div class="progress-bar" style="margin:0 0 8px;"><div class="progress-fill" id="obar-${oi}" style="width:${total?Math.round(done/total*100):0}%"></div></div>
        <div class="order-group-label">Breakfast items</div>${bItems}
        <div class="order-group-label">Lunch items</div>${lItems}
        ${custSection}
        <div class="add-order-row" style="margin-top:12px;">
          <input type="text" id="newOrdInput-${oi}" placeholder="Add a custom item…" onkeydown="if(event.key==='Enter')addCustomOrder(${oi})">
          <button onclick="addCustomOrder(${oi})">+ Add</button>
        </div>
        <div style="margin-top:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <button class="reset-btn" onclick="resetOrder(${oi})">reset checklist</button>
          <button class="action-btn" onclick="printOrder(${oi})" style="font-size:12px;padding:5px 10px;">&#128438; Print this order</button>
          <button class="action-btn primary" onclick="openEmailModal(${oi})" style="font-size:12px;padding:5px 10px;">&#9993; Email this order</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleOrder_section(oi){
  const body=document.getElementById(`obody-${oi}`);
  const arr=document.getElementById(`oarr-${oi}`);
  const open=body.classList.toggle('open');
  arr.textContent=open?'▲':'▼';
}
function toggleOrder(key,oi){
  orderChecks[key]=!orderChecks[key];
  const row=document.getElementById(`orow-${key}`);
  if(row) orderChecks[key]?row.classList.add('done'):row.classList.remove('done');
  updateOrderMeta(oi);
}
function toggleCustomOrder(key,oi){
  customOrderDone[key]=!customOrderDone[key];
  const row=document.getElementById(`corow-${key}`);
  if(row) customOrderDone[key]?row.classList.add('done'):row.classList.remove('done');
  updateOrderMeta(oi);
}
function updateOrderMeta(oi){
  const {total,done}=getOrderProgress(oi);
  const allDone=total>0&&done===total;
  const bar=document.getElementById(`obar-${oi}`),pill=document.getElementById(`opill-${oi}`);
  if(bar) bar.style.width=(total?Math.round(done/total*100):0)+'%';
  if(pill){pill.textContent=`${done}/${total}${allDone?' ✓':''}`;pill.className='progress-pill'+(allDone?' done-all':'');}
}
function addCustomOrder(oi){
  const inp=document.getElementById(`newOrdInput-${oi}`);
  const val=inp.value.trim(); if(!val) return;
  const k=`${cycleKey()}-${oi}`;
  if(!customOrderItems[k]) customOrderItems[k]=[];
  customOrderItems[k].push(val);
  renderOrders();
  // reopen the section
  const body=document.getElementById(`obody-${oi}`);
  const arr=document.getElementById(`oarr-${oi}`);
  if(body&&!body.classList.contains('open')){body.classList.add('open');arr.textContent='▲';}
}
function deleteCustomOrder(oi,idx){
  const k=`${cycleKey()}-${oi}`;
  if(customOrderItems[k]){
    const key=mkCustOrdId(cycleKey(),oi,idx);
    delete customOrderDone[key];
    for(let j=idx+1;j<customOrderItems[k].length;j++){
      customOrderDone[mkCustOrdId(cycleKey(),oi,j-1)]=customOrderDone[mkCustOrdId(cycleKey(),oi,j)];
      delete customOrderDone[mkCustOrdId(cycleKey(),oi,j)];
    }
    customOrderItems[k].splice(idx,1);
  }
  renderOrders();
  const body=document.getElementById(`obody-${oi}`),arr=document.getElementById(`oarr-${oi}`);
  if(body&&!body.classList.contains('open')){body.classList.add('open');arr.textContent='▲';}
}
function resetOrder(oi){
  const cycle=cycleKey(), o=orderTemplates[oi];
  o.breakfast.forEach((_,ii)=>{delete orderChecks[mkOrdId(cycle,oi,'b',ii)];});
  o.lunch.forEach((_,ii)=>{delete orderChecks[mkOrdId(cycle,oi,'l',ii)];});
  const k=`${cycle}-${oi}`;
  (customOrderItems[k]||[]).forEach((_,ii)=>{delete customOrderDone[mkCustOrdId(cycle,oi,ii)];});
  renderOrders();
  const body=document.getElementById(`obody-${oi}`),arr=document.getElementById(`oarr-${oi}`);
  if(body&&!body.classList.contains('open')){body.classList.add('open');arr.textContent='▲';}
}

// ── Print & Email ─────────────────────────────────────────────────────────────
function printOrder(oi){
  // Mark which order to print, open its body, then print
  document.querySelectorAll('.order-section').forEach((el,idx)=>{
    el.setAttribute('data-oi',idx);
  });
  // Store target oi on body for CSS
  document.body.setAttribute('data-print-oi', oi);
  // Ensure the target body is open
  const body=document.getElementById(`obody-${oi}`);
  const arr=document.getElementById(`oarr-${oi}`);
  if(body&&!body.classList.contains('open')){body.classList.add('open');if(arr)arr.textContent='▲';}
  setTimeout(()=>{
    window.print();
    document.body.removeAttribute('data-print-oi');
  },100);
}

function buildOrderText(oi){
  const o=orderTemplates[oi];
  const orderDate=fmt(cd(o.orderDay.wk,o.orderDay.d));
  const deliverDate=fmt(cd(o.deliverDay.wk,o.deliverDay.d));
  const coverDates=o.coversDays.map(c=>fmt(cd(c.wk,c.d))).join(', ');
  let lines=[];
  lines.push(`PIER — SUMMER SCHOOL FOOD ORDER`);
  lines.push(`Order by: ${orderDate}`);
  lines.push(`Delivery: ${deliverDate}`);
  lines.push(`Covers: ${coverDates}`);
  lines.push(`Serving: ${qtyB} breakfasts / ${qtyL} lunches per day`);
  lines.push('');
  lines.push('BREAKFAST ITEMS');
  lines.push('───────────────────────────────');
  o.breakfast.forEach((item,ii)=>{
    const ik=invKey(oi,'b',ii);
    const needed=calcQtyNeeded(item);
    const onHand=parseInt(inventory[ik])||0;
    const toOrder=Math.max(0,needed-onHand);
    const status=toOrder===0?'(have enough)':'ORDER: '+toOrder;
    lines.push(`  ${item.name}`);
    lines.push(`    Need ${needed}  |  On hand: ${onHand}  |  ${status}`);
  });
  lines.push('');
  lines.push('LUNCH ITEMS');
  lines.push('───────────────────────────────');
  o.lunch.forEach((item,ii)=>{
    const ik=invKey(oi,'l',ii);
    const needed=calcQtyNeeded(item);
    const onHand=parseInt(inventory[ik])||0;
    const toOrder=Math.max(0,needed-onHand);
    const status=toOrder===0?'(have enough)':'ORDER: '+toOrder;
    lines.push(`  ${item.name}`);
    lines.push(`    Need ${needed}  |  On hand: ${onHand}  |  ${status}`);
  });
  const custList=customOrderItems[`${cycleKey()}-${oi}`]||[];
  if(custList.length){
    lines.push('');
    lines.push('ADDITIONAL ITEMS');
    lines.push('───────────────────────────────');
    custList.forEach(name=>lines.push(`  ${name}`));
  }
  return lines.join('\n');
}

function openEmailModal(oi){
  const sel=document.getElementById('emailOrderSel');
  sel.innerHTML=orderTemplates.map((o,idx)=>{
    const orderDate=fmt(cd(o.orderDay.wk,o.orderDay.d));
    const coverDates=o.coversDays.map(c=>fmt(cd(c.wk,c.d))).join(' & ');
    return `<option value="${idx}"${idx===oi?' selected':''}>Order due ${orderDate} — covers ${coverDates}</option>`;
  }).join('');
  updateEmailSubject();
  sel.onchange=updateEmailSubject;
  document.getElementById('emailModalBg').style.display='flex';
}
function updateEmailSubject(){
  const oi=parseInt(document.getElementById('emailOrderSel').value);
  const o=orderTemplates[oi];
  const orderDate=fmt(cd(o.orderDay.wk,o.orderDay.d));
  const coverDates=o.coversDays.map(c=>fmt(cd(c.wk,c.d))).join(' & ');
  document.getElementById('emailSubject').value=`Pier — Summer School Food Order — due ${orderDate} (covers ${coverDates})`;
}
function closeEmailModal(){
  document.getElementById('emailModalBg').style.display='none';
}
function sendEmail(){
  const oi=parseInt(document.getElementById('emailOrderSel').value);
  const to=document.getElementById('emailTo').value.trim();
  const subject=document.getElementById('emailSubject').value.trim();
  const body=buildOrderText(oi);
  // Open Gmail compose in a new tab so user can review before sending
  const gmailUrl='https://mail.google.com/mail/?authuser=foodwo@fonddulac.k12.wi.us&view=cm&fs=1'
    +'&to='+encodeURIComponent(to)
    +'&su='+encodeURIComponent(subject)
    +'&body='+encodeURIComponent(body);
  window.open(gmailUrl,'_blank');
  closeEmailModal();
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateCycleBanner(); updateWeekBtns(); renderDays(); renderCashier(); renderOrders();
</script>
